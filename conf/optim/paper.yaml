# @package _global_

# MAMMAL Paper settings (An et al., Nature Communications 2023)
# Paper: "5 iterations per frame yielded fairly good results for T > 0"
# Paper speed: ~1.2-2 seconds/frame

optim:
  solve_step0_iters: 60   # First frame needs more (paper: 60)
  solve_step1_iters: 5    # Tracking frames (paper: 3-5)
  solve_step2_iters: 3    # Refinement (paper: 3)

# Disable silhouette loss for speed (paper: wsil=0 for tracking)
loss_weights:
  mask_step1: 0.0
  mask_step2: 0.0
