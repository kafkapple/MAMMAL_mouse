# @package _global_

# Ultra-fast config for rapid testing
# ~5x faster than default, ~50x faster than accurate

optim:
  solve_step0_iters: 30   # First frame
  solve_step1_iters: 5    # Tracking (paper minimum)
  solve_step2_iters: 3    # Refinement

fitter:
  with_render: false
  generate_visualizations: false
  create_videos: false
  create_report: false

loss_weights:
  mask_step1: 0.0
  mask_step2: 0.0
